<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MP3Sync</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;
  --border:rgba(255,255,255,.08);--accent:#6c6fff;--accent-h:#8585ff;
  --text:#e8eaf6;--muted:#8a8fa8;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
header{padding:18px 32px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.logo-mark{color:var(--accent);font-size:24px}
main{flex:1;max-width:820px;margin:0 auto;padding:56px 24px 48px;width:100%}
.hero{text-align:center;margin-bottom:60px}
.hero h1{font-size:46px;font-weight:800;letter-spacing:-1.5px;margin-bottom:10px;background:linear-gradient(135deg,#fff 40%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--muted);font-size:16px;margin-bottom:44px}
.actions{display:flex;align-items:stretch;justify-content:center;gap:0;max-width:560px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--border);padding:28px 24px;flex:1;display:flex;flex-direction:column;gap:14px;align-items:center}
.card:first-child{border-radius:16px 0 0 16px;border-right:none}
.card:last-child{border-radius:0 16px 16px 0}
.or-sep{display:flex;align-items:center;background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:0 16px;color:var(--muted);font-size:12px;font-weight:600;flex-shrink:0}
.card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.btn{border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;padding:11px 24px;transition:background .15s,transform .1s;width:100%}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-h)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:var(--surface2);color:var(--text)}
.btn-secondary:hover{background:#2e3350}
.code-input{background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Courier New',monospace;font-size:24px;font-weight:700;letter-spacing:.2em;outline:none;padding:10px 12px;text-align:center;width:100%;transition:border-color .15s}
.code-input:focus{border-color:var(--accent)}
.code-input::placeholder{font-size:13px;letter-spacing:.05em;font-weight:400;color:var(--muted);font-family:inherit}
.err{background:rgba(244,67,54,.12);border:1px solid rgba(244,67,54,.3);border-radius:8px;color:#ff7070;font-size:13px;margin-top:16px;padding:10px 14px;text-align:center;display:none}
.section{margin-top:8px}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.section-head h2{font-size:17px;font-weight:700}
.badge{background:var(--surface2);border-radius:20px;color:var(--muted);font-size:11px;font-weight:700;padding:3px 10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.room-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;cursor:pointer;padding:18px;transition:border-color .15s,background .15s}
.room-card:hover{border-color:var(--accent);background:var(--surface2)}
.rc-code{font-family:'Courier New',monospace;font-size:24px;font-weight:800;letter-spacing:.12em;color:var(--accent);margin-bottom:6px}
.rc-users{color:var(--muted);font-size:12px;margin-bottom:3px}
.rc-names{color:var(--text);font-size:13px;font-weight:500;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rc-track{color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:12px}
.rc-join{background:var(--accent);border:none;border-radius:7px;color:#fff;cursor:pointer;font-size:12px;font-weight:600;padding:6px 14px;transition:background .15s}
.rc-join:hover{background:var(--accent-h)}
.empty{background:var(--surface);border:1px dashed var(--border);border-radius:14px;color:var(--muted);font-size:14px;grid-column:1/-1;padding:44px;text-align:center}
</style>
</head>
<body>
<header>
  <div class="logo"><span class="logo-mark">♫</span> MP3Sync</div>
</header>
<main>
  <div class="hero">
    <h1>Listen Together</h1>
    <p>Create a room and share the code — everyone hears the same thing in sync</p>
    <div class="actions">
      <div class="card">
        <div class="card-label">New room</div>
        <button class="btn btn-primary" id="createBtn" onclick="createRoom()">+ Create Room</button>
      </div>
      <div class="or-sep">or</div>
      <div class="card">
        <div class="card-label">Join room</div>
        <input class="code-input" id="codeInput" type="text" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="off">
        <button class="btn btn-secondary" onclick="joinRoom()">Join →</button>
      </div>
    </div>
    <div class="err" id="err"></div>
  </div>

  <div class="section">
    <div class="section-head">
      <h2>Active Rooms</h2>
      <span class="badge" id="roomCount">0</span>
    </div>
    <div class="grid" id="grid">
      <div class="empty">No active rooms yet. Create one to get started.</div>
    </div>
  </div>
</main>

<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function createRoom(){
  const btn=document.getElementById('createBtn');
  btn.textContent='Creating…';btn.disabled=true;
  try{
    const r=await fetch('/api/rooms',{method:'POST'});
    if(!r.ok)throw new Error(await r.text());
    const d=await r.json();
    window.location.href='/room/'+d.code;
  }catch(e){
    showErr('Failed to create room: '+e.message);
    btn.textContent='+ Create Room';btn.disabled=false;
  }
}

function joinRoom(){
  const code=document.getElementById('codeInput').value.replace(/\D/g,'');
  if(code.length!==6){showErr('Please enter the full 6-digit code');return;}
  window.location.href='/room/'+code;
}

document.getElementById('codeInput').addEventListener('keydown',e=>{if(e.key==='Enter')joinRoom()});
document.getElementById('codeInput').addEventListener('input',e=>{
  e.target.value=e.target.value.replace(/\D/g,'').slice(0,6);
});

function showErr(msg){
  const el=document.getElementById('err');
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',6000);
}

const params=new URLSearchParams(location.search);
if(params.get('error')==='expired')showErr('Room not found or has expired.');

async function loadRooms(){
  try{
    const rooms=await(await fetch('/api/rooms')).json();
    const grid=document.getElementById('grid');
    document.getElementById('roomCount').textContent=rooms.length;
    if(!rooms.length){
      grid.innerHTML='<div class="empty">No active rooms yet. Create one to get started.</div>';
      return;
    }
    grid.innerHTML=rooms.map(rm=>{
      const track=rm.track?'🎵 '+esc(rm.track.replace(/\.[^.]+$/,'')):'○ Idle';
      const who=rm.names.length?esc(rm.names.join(', ')):'<em style="color:var(--muted)">empty</em>';
      return`<div class="room-card" onclick="location.href='/room/${rm.code}'">
        <div class="rc-code">${rm.code}</div>
        <div class="rc-users">👤 ${rm.users} ${rm.users===1?'listener':'listeners'}</div>
        <div class="rc-names">${who}</div>
        <div class="rc-track">${track}</div>
        <button class="rc-join" onclick="event.stopPropagation();location.href='/room/${rm.code}'">Join →</button>
      </div>`;
    }).join('');
  }catch{}
}
loadRooms();
setInterval(loadRooms,3000);
</script>
</body>
</html>
